name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      - name: Run eval harness (regression gate)
        run: uv run hydra-eval --demo --min-hit-rate 0.7
